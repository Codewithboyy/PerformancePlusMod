name: Build Fabric Mod

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install Gradle
        run: |
          wget https://services.gradle.org/distributions/gradle-8.8-bin.zip
          unzip gradle-8.8-bin.zip
          sudo mv gradle-8.8 /opt/gradle
          echo "/opt/gradle/bin" >> $GITHUB_PATH

      - name: Verify Gradle
        run: gradle -v

      - name: Build Mod
        run: gradle build

      - name: Upload Mod JAR
        uses: actions/upload-artifact@v4
        with:
          name: PerformancePlusMod
          path: build/libs/*.jar
